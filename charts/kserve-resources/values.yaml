kserve:
  version: v0.17.0
  createSharedResources: true
  inferenceServiceConfig:
    enabled: ''
  certManager:
    enabled: ''
  storagecontainer:
    enabled: ''
  agent:
    image: kserve/agent
    tag: ''
  router:
    image: kserve/router
    tag: ''
    imagePullPolicy: IfNotPresent
    imagePullSecrets: []
  service:
    serviceClusterIPNone: false
  storage:
    image: kserve/storage-initializer
    tag: ''
    resources:
      requests:
        memory: 100Mi
        cpu: 100m
      limits:
        memory: 1Gi
        cpu: '1'
    containerSecurityContext:
      allowPrivilegeEscalation: false
      privileged: false
      runAsNonRoot: true
      capabilities:
        drop:
          - ALL
    enableModelcar: true
    uidModelcar: 1010
    cpuModelcar: 10m
    memoryModelcar: 15Mi
    caBundleConfigMapName: ''
    caBundleVolumeMountPath: /etc/ssl/custom-certs
    storageSpecSecretName: storage-config
    storageSecretNameAnnotation: serving.kserve.io/secretName
    s3:
      accessKeyIdName: AWS_ACCESS_KEY_ID
      secretAccessKeyName: AWS_SECRET_ACCESS_KEY
      endpoint: ''
      useHttps: ''
      region: ''
      verifySSL: ''
      useVirtualBucket: ''
      useAnonymousCredential: ''
      CABundleConfigMap: ''
      CABundle: ''
  metricsaggregator:
    enableMetricAggregation: 'false'
    enablePrometheusScraping: 'false'
  servingruntime:
    modelNamePlaceholder: "{{.Name}}"
    tensorflow:
      disabled: false
      image: tensorflow/serving
      tag: 2.6.2
      imagePullSecrets: []
      securityContext:
        runAsUser: 1000 # User is not defined in the Dockerfile, so we need to set it here to run as non-root
        allowPrivilegeEscalation: false
        privileged: false
        runAsNonRoot: true
        capabilities:
          drop:
            - ALL
    mlserver:
      disabled: false
      image: docker.io/seldonio/mlserver
      tag: 1.5.0
      modelClassPlaceholder: "{{.Labels.modelClass}}"
      imagePullSecrets: []
      securityContext:
        allowPrivilegeEscalation: false
        privileged: false
        runAsNonRoot: true
        capabilities:
          drop:
            - ALL
    sklearnserver:
      disabled: false
      image: kserve/sklearnserver
      tag: *defaultVersion
      imagePullSecrets: []
      securityContext:
        allowPrivilegeEscalation: false
        privileged: false
        runAsNonRoot: true
        capabilities:
          drop:
            - ALL
    xgbserver:
      disabled: false
      image: kserve/xgbserver
      tag: *defaultVersion
      imagePullSecrets: []
      securityContext:
        allowPrivilegeEscalation: false
        privileged: false
        runAsNonRoot: true
        capabilities:
          drop:
            - ALL
    huggingfaceserver:
      disabled: false
      image: kserve/huggingfaceserver
      tag: *defaultVersion
      imagePullSecrets: []
      securityContext:
        allowPrivilegeEscalation: false
        privileged: false
        runAsNonRoot: true
        capabilities:
          drop:
            - ALL
      lmcacheUseExperimental: "True"
      devShm:
        enabled: false
        sizeLimit: ""
      hostIPC:
        enabled: false
    huggingfaceserver_multinode:
      disabled: false
      imagePullSecrets: []
      securityContext:
        allowPrivilegeEscalation: false
        privileged: false
        runAsNonRoot: true
        capabilities:
          drop:
            - ALL
      shm:
        enabled: true
        sizeLimit: "3Gi"
    tritonserver:
      disabled: false
      image: nvcr.io/nvidia/tritonserver
      tag: 23.05-py3
      imagePullSecrets: []
      securityContext:
        runAsUser: 1000 # https://docs.nvidia.com/deeplearning/triton-inference-server/user-guide/docs/customization_guide/deploy.html#run-as-a-non-root-user
        allowPrivilegeEscalation: false
        privileged: false
        runAsNonRoot: true
        capabilities:
          drop:
            - ALL
    pmmlserver:
      disabled: false
      image: kserve/pmmlserver
      tag: *defaultVersion
      imagePullSecrets: []
      securityContext:
        allowPrivilegeEscalation: false
        privileged: false
        runAsNonRoot: true
        capabilities:
          drop:
            - ALL
    paddleserver:
      disabled: false
      image: kserve/paddleserver
      tag: *defaultVersion
      imagePullSecrets: []
      securityContext:
        allowPrivilegeEscalation: false
        privileged: false
        runAsNonRoot: true
        capabilities:
          drop:
            - ALL
    lgbserver:
      disabled: false
      image: kserve/lgbserver
      tag: *defaultVersion
      imagePullSecrets: []
      securityContext:
        allowPrivilegeEscalation: false
        privileged: false
        runAsNonRoot: true
        capabilities:
          drop:
            - ALL
    catboostserver:
      disabled: false
      image: kserve/catboostserver
      tag: *defaultVersion
      imagePullSecrets: []
      securityContext:
        allowPrivilegeEscalation: false
        privileged: false
        runAsNonRoot: true
        capabilities:
          drop:
            - ALL
    torchserve:
      disabled: false
      image: pytorch/torchserve-kfs
      tag: 0.9.0
      serviceEnvelopePlaceholder: "{{.Labels.serviceEnvelope}}"
      imagePullSecrets: []
      securityContext:
        runAsUser: 1000 # User ID is not defined in the Dockerfile, so we need to set it here to run as non-root
        allowPrivilegeEscalation: false
        privileged: false
        runAsNonRoot: true
        capabilities:
          drop:
            - ALL
    art:
      image: kserve/art-explainer
      defaultVersion: *defaultVersion
      imagePullSecrets: []
  localmodel:
    enabled: false
    controller:
      image: kserve/kserve-localmodel-controller
      tag: ''
    jobNamespace: kserve-localmodel-jobs
    jobTTLSecondsAfterFinished: 3600
    defaultJobImage: kserve/storage-initializer
    defaultJobTag: ''
    securityContext:
      fsGroup: 1000
    disableVolumeManagement: false
    agent:
      nodeSelector: {}
      affinity: {}
      tolerations: []
      hostPath: /mnt/models
      image: kserve/kserve-localmodelnode-agent
      tag: ''
      reconcilationFrequencyInSecs: 60
      securityContext:
        runAsUser: 1000
        runAsNonRoot: true
  security:
    autoMountServiceAccountToken: true
  inferenceservice:
    resources:
      limits:
        cpu: '1'
        memory: 2Gi
      requests:
        cpu: '1'
        memory: 2Gi
  opentelemetryCollector:
    scrapeInterval: 5s
    metricReceiverEndpoint: keda-otel-scaler.keda.svc:4317
    metricScalerEndpoint: keda-otel-scaler.keda.svc:4318
    resource:
      cpuLimit: '1'
      memoryLimit: 2Gi
      cpuRequest: 200m
      memoryRequest: 512Mi
  autoscaler:
    scaleUpStabilizationWindowSeconds: '0'
    scaleDownStabilizationWindowSeconds: '300'
  controller:
    deploymentMode: Knative
    rbacProxyImage: quay.io/brancz/kube-rbac-proxy:v0.18.0
    rbacProxy:
      resources:
        limits:
          cpu: 100m
          memory: 300Mi
        requests:
          cpu: 100m
          memory: 300Mi
      securityContext:
        allowPrivilegeEscalation: false
        privileged: false
        capabilities:
          drop:
            - ALL
        readOnlyRootFilesystem: true
        runAsNonRoot: true
    labels: {}
    podLabels: {}
    annotations: {}
    podAnnotations: {}
    serviceAnnotations: {}
    webhookServiceAnnotations: {}
    securityContext:
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault
    containerSecurityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      privileged: false
      readOnlyRootFilesystem: true
      runAsNonRoot: true
    metricsBindAddress: 127.0.0.1
    metricsBindPort: '8080'
    gateway:
      domain: example.com
      additionalIngressDomains: []
      domainTemplate: '{{ .Name }}-{{ .Namespace }}.{{ .IngressDomain }}'
      pathTemplate: ''
      urlScheme: http
      disableIstioVirtualHost: false
      disableIngressCreation: false
      disableHTTPRouteTimeout: false
      localGateway:
        gateway: knative-serving/knative-local-gateway
        gatewayService: knative-local-gateway.istio-system.svc.cluster.local
        knativeGatewayService: ''
      ingressGateway:
        enableGatewayApi: false
        kserveGateway: kserve/kserve-ingress-gateway
        createGateway: false
        gateway: knative-serving/knative-ingress-gateway
        className: istio
    nodeSelector: {}
    tolerations: []
    topologySpreadConstraints: []
    affinity: {}
    image: kserve/kserve-controller
    tag: ''
    imagePullSecrets: []
    resources:
      limits:
        cpu: 100m
        memory: 300Mi
      requests:
        cpu: 100m
        memory: 300Mi
    knativeAddressableResolver:
      enabled: false
